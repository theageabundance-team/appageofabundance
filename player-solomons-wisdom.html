<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Solomon's Wisdom | Age of Abundance</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0f0c;--bg2:#0a120d;--card:#0d1a10;--acc:#74c69d;--acc-light:#a8dfc0;--acc-dim:rgba(116,198,157,0.1);--acc-border:rgba(116,198,157,0.28);--text:#f0ece0;--text-dim:#8aaa94;--text-muted:#4a6a54;}
    *{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:17px;line-height:1.75;min-height:100vh;opacity:0;animation:fadeIn 0.7s ease forwards;}
    body.page-fade-out{animation:fadeOut 0.35s ease forwards;}
    @keyframes fadeIn{to{opacity:1}}@keyframes fadeOut{to{opacity:0}}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;}
    .banner{background:var(--bg2);border-bottom:1px solid var(--acc-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
    .badge-wrap{background:var(--acc-dim);border:1px solid var(--acc-border);border-radius:3px;padding:6px 14px;display:flex;align-items:center;gap:10px;}
    .badge-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);}
    .badge-sub{font-size:11px;color:var(--text-dim);}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--text-dim);text-decoration:none;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;transition:color .2s;}
    .back-btn:hover{color:var(--acc);}
    .hero{text-align:center;padding:60px 24px 44px;position:relative;overflow:hidden;}
    .hero-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(116,198,157,0.09) 0%,transparent 70%);pointer-events:none;}
    .day-pill{display:inline-block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);border:1px solid var(--acc-border);border-radius:20px;padding:6px 18px;margin-bottom:20px;opacity:.8;}
    .hero-title{font-family:'Cinzel',serif;font-size:clamp(28px,6vw,50px);font-weight:700;color:var(--acc);line-height:1.15;margin-bottom:8px;}
    .hero-sub{font-size:clamp(15px,2.5vw,18px);color:var(--text-dim);font-style:italic;margin-bottom:24px;}
    .hero-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);margin:0 auto 20px;}
    .hero-date{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);}
    .content-wrap{max-width:680px;margin:0 auto;padding:0 24px 80px;}
    .focus-card{background:var(--card);border:1px solid var(--acc-border);border-top:3px solid var(--acc);border-radius:6px;padding:40px 36px;margin-bottom:20px;animation:slideUp 0.5s ease forwards;opacity:0;}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);opacity:.6;margin-bottom:10px;}
    .card-theme{font-family:'Cinzel',serif;font-size:24px;font-weight:600;color:var(--acc);margin-bottom:16px;}
    .week-badge{display:inline-block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;background:var(--acc-dim);border:1px solid var(--acc-border);color:var(--acc);border-radius:2px;padding:4px 12px;margin-bottom:20px;}
    .card-divider{height:1px;background:var(--acc-border);margin-bottom:24px;}
    .proverb-box{background:rgba(116,198,157,0.07);border-left:3px solid var(--acc);border-radius:0 4px 4px 0;padding:20px 24px;margin-bottom:20px;font-style:italic;font-size:18px;color:var(--acc-light);line-height:1.7;}
    .card-body-text{font-size:16px;color:var(--text-dim);line-height:1.85;margin-bottom:32px;}
    .done-btn{width:100%;background:transparent;border:1px solid var(--acc-border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;border-radius:3px;padding:16px 24px;cursor:pointer;transition:all .25s;}
    .done-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim);}
    .done-btn.done{background:var(--acc-dim);border-color:var(--acc);color:var(--acc);cursor:default;}
    .other-cards-section{max-width:680px;margin:0 auto;padding:0 24px 60px;}
    .other-cards-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;text-align:center;}
    .other-cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .other-card{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:16px 10px;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:all .2s;position:relative;overflow:hidden;}
    .other-card:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-2px);}
    .other-card.is-done{border-color:rgba(80,200,100,0.4);background:rgba(80,200,100,0.06);}
    .other-card-icon{font-size:22px;margin-bottom:6px;}
    .other-card-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);line-height:1.3;}
    .other-card-check{position:absolute;top:6px;right:8px;font-size:11px;color:#5cc878;}
    .celeb-overlay{display:none;position:fixed;inset:0;background:rgba(5,3,10,.88);z-index:600;align-items:center;justify-content:center;padding:24px;}
    .celeb-overlay.visible{display:flex;}
    .celeb-modal{background:#1a1020;border:1px solid #c9a84c;border-top:3px solid #c9a84c;border-radius:6px;padding:48px 36px;text-align:center;max-width:440px;width:100%;animation:revealUp .4s ease;}
    @keyframes revealUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .celeb-stars{font-size:14px;color:#c9a84c;letter-spacing:.3em;margin-bottom:16px;}
    .celeb-emoji{font-size:52px;margin-bottom:16px;}
    .celeb-title{font-family:'Cinzel',serif;font-size:22px;color:#c9a84c;font-weight:700;margin-bottom:10px;}
    .celeb-text{font-size:15px;color:#b8a898;line-height:1.75;margin-bottom:20px;}
    .celeb-verse{font-style:italic;font-size:13px;color:rgba(201,168,76,.6);margin-bottom:28px;}
    .celeb-btn{background:linear-gradient(135deg,#8a6020,#c9a84c);color:#0a0508;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;border:none;border-radius:3px;padding:15px 32px;cursor:pointer;width:100%;}
    .nav-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
    .nav-card{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:16px 12px;text-align:center;cursor:pointer;text-decoration:none;transition:all .2s;display:block;}
    .nav-card:hover{border-color:var(--acc-border);}
    .nav-card-icon{font-size:22px;margin-bottom:6px;}
    .nav-card-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);line-height:1.3;}
    @media(max-width:600px){.focus-card{padding:28px 20px;}}
  </style>
</head>
<body>
  <header class="banner">
    <div class="badge-wrap"><span style="font-size:18px;">👑</span><div><div class="badge-title">Today's Practice</div><div class="badge-sub">Solomon's Wisdom</div></div></div>
    <a href="index.html" class="back-btn" onclick="navigateTo(event,'index.html')">← Back to Home</a>
  </header>
  <section class="hero">
    <div class="hero-glow"></div>
    <div class="day-pill" id="dayPill"></div>
    <h1 class="hero-title">Solomon's Wisdom</h1>
    <p class="hero-sub">Ancient wisdom for your path today</p>
    <div class="hero-divider"></div>
    <p class="hero-date" id="heroDate"></p>
  </section>
  <div class="content-wrap">
    <div class="focus-card" style="animation-delay:0.1s">
      <div class="card-eyebrow">👑 Today's Teaching</div>
      <div class="card-theme" id="focusTheme"></div>
      <div class="week-badge" id="weekBadge"></div>
      <div class="card-divider"></div>
      <div class="proverb-box" id="proverbText"></div>
      <div class="card-body-text" id="focusDesc"></div>
      <button class="done-btn" id="doneBtn" onclick="markDone()">✦ Apply This Wisdom</button>
    </div>

  </div>
  <script src="supabase-client.js"></script>
  <script>
    const SOLOMONS=[{0:{theme:'Rest & Trust',proverb:'"Better is a handful of quietness than two hands full of toil and a striving after wind."',desc:'Rest is not a reward for the finished — it is the seal of trust. The wise man rests because he knows who holds tomorrow.'},1:{theme:'Prosperity',proverb:'"Lazy hands make for poverty, but diligent hands bring wealth."',desc:'Prosperity does not visit those who wait — it pursues those who work with order. Your diligence today is tomorrow\'s harvest.'},2:{theme:'Mindset',proverb:'"Above all else, guard your heart, for everything you do flows from it."',desc:'If you do not govern what you feel, the world will govern you. The heart is your command center — protect it like a king guards his throne.'},3:{theme:'Connection',proverb:'"Plans fail for lack of counsel, but with many advisers they succeed."',desc:'Learn to listen before you decide. Rushing past wisdom is rushing toward regret. Slow down and hear the counsel around you.'},4:{theme:'Abundance',proverb:'"One person gives freely, yet gains even more; another withholds unduly, but comes to poverty."',desc:'The law is unbreakable: the flow only continues if there is an outlet. Give generously today and watch the channel expand.'},5:{theme:'Protection',proverb:'"The prudent see danger and take refuge, but the simple keep going and pay the penalty."',desc:'Wisdom is not paranoia — it is awareness. Do not ignore the warning signs placed on your path today.'},6:{theme:'Vision',proverb:'"Careful planning puts you ahead in the long run; hurry and scurry puts you further behind."',desc:'Vision without strategy is just enthusiasm. A plan well made is already half executed. Take time to map your route.'}},{0:{theme:'Rest & Value',proverb:'"Better a dry crust with peace and quiet than a house full of feasting, with strife."',desc:'Treasure the peace of your home today above any external gain. A quiet table in a house of love is worth more than abundance in a house of war.'},1:{theme:'Prosperity',proverb:'"Honor the Lord with your wealth and with the firstfruits of all your produce."',desc:'When you put the Source in the right place, the channel never dries. Honor first, and watch overflow follow.'},2:{theme:'Mindset',proverb:'"A gentle answer turns away wrath, but a harsh word stirs up anger."',desc:'Your authority today will be measured by your ability to stay calm under pressure. The wise ruler governs through peace, not force.'},3:{theme:'Connection',proverb:'"The fear of the Lord is the beginning of wisdom."',desc:'Acknowledging that you do not know everything is the first step toward God teaching you the fastest path. Humility opens the door wisdom walks through.'},4:{theme:'Abundance',proverb:'"The generous will themselves be refreshed; those who water others will themselves be watered."',desc:'True wealth begins in a mind that already feels provided for. The one who gives from fullness always receives more.'},5:{theme:'Protection',proverb:'"Whoever walks in integrity walks securely, but whoever takes crooked paths will be found out."',desc:'Truth is your most efficient armor — it costs nothing and protects everything. Walk in integrity today without exception.'},6:{theme:'Vision',proverb:'"There is surely a future hope for you, and your hope will not be cut off."',desc:'Keep your eyes on the horizon. The present is just a step, not a destination. What you hope for is already being prepared.'}},{0:{theme:'Rest & Seasons',proverb:'"There is a time for everything, and a season for every activity under the heavens."',desc:'Today the purpose is to enjoy. The season of sowing has passed — the time of rest has come. Enter it without guilt.'},1:{theme:'Prosperity',proverb:'"Invest in seven ventures, yes, in eight; you do not know what disaster may come upon the land."',desc:'Multiply your sources. Do not place all your hope in a single channel. Diversification is wisdom in motion.'},2:{theme:'Mindset',proverb:'"Pride goes before destruction, a haughty spirit before a fall."',desc:'Keep your heart teachable. Humility is the red carpet of honor. The higher you are called, the lower you must be willing to bow.'},3:{theme:'Connection',proverb:'"As iron sharpens iron, so one person sharpens another."',desc:'Choose carefully who sits at your table today. Your connections define your speed. The right people sharpen your edge.'},4:{theme:'Abundance',proverb:'"The blessing of the Lord brings wealth, without painful toil for it."',desc:'If your gain brings anguish, examine the source. Kingdom wealth arrives with peace, not with anxiety. Adjust the channel.'},5:{theme:'Protection',proverb:'"The rich rule over the poor, and the borrower is slave to the lender."',desc:'Flee the chains of debt. Freedom is the soil of creativity. Every obligation you eliminate creates space for something greater.'},6:{theme:'Vision',proverb:'"By wisdom a house is built, and through understanding it is established; through knowledge its rooms are filled with rare and beautiful treasures."',desc:'Knowledge is the most valuable real estate you can acquire. Invest in learning and watch your inner rooms fill with treasure.'}},{0:{theme:'Rest & Joy',proverb:'"I commend the enjoyment of life, because there is nothing better for a person under the sun than to eat and drink and be glad."',desc:'Celebrate what you have already conquered. Rest and joy are not laziness — they are the fruit of a life well planted.'},1:{theme:'Prosperity',proverb:'"A good person leaves an inheritance for their children\'s children."',desc:'Do not only work to pay bills. Work to build an empire that outlasts you. Your legacy is your greatest investment.'},2:{theme:'Mindset',proverb:'"As he thinks in his heart, so he is."',desc:'Your physical reality is just a reflection of your inner image. Change the mirror today — and watch the world outside begin to align.'},3:{theme:'Connection',proverb:'"A good name is more desirable than great riches; to be esteemed is better than silver or gold."',desc:'Your reputation opens doors that money cannot buy. Guard your word today as the most valuable currency you carry.'},4:{theme:'Abundance',proverb:'"Whoever sows injustice reaps calamity, and the rod they wield in fury will be broken."',desc:'The universe is an echo — what you send returns amplified. Sow integrity, generosity, and love. The harvest matches the seed.'},5:{theme:'Protection',proverb:'"The name of the Lord is a fortified tower; the righteous run to it and are safe."',desc:'When the world shakes, do not trust your bank account — trust the Rock. Run to the Name that never changes.'},6:{theme:'Vision',proverb:'"Commit to the Lord whatever you do, and He will establish your plans."',desc:'Lift the weight off your shoulders and place it on the altar. When God is the co-author of your plans, success is not a possibility — it is a promise.'}}];
    const WEEK_NAMES=['Week 1 — Harvest & Diligence','Week 2 — Character & Flow','Week 3 — Mastery & Influence','Week 4 — Legacy & Fullness'];
    const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    function getContent(){let s=localStorage.getItem('abundance_start_date');if(!s){s=new Date().toISOString().split('T')[0];localStorage.setItem('abundance_start_date',s);}const start=new Date(s+'T00:00:00');const today=new Date();today.setHours(0,0,0,0);const days=Math.floor((today-start)/86400000);const wi=Math.floor(days/7)%4;const dow=today.getDay();return{data:SOLOMONS[wi][dow],wi,dow};}
    function init(){const{data,wi,dow}=getContent();const today=new Date();document.getElementById('dayPill').textContent=DOW[dow];document.getElementById('heroDate').textContent=today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});document.getElementById('focusTheme').textContent=data.theme;document.getElementById('weekBadge').textContent=WEEK_NAMES[wi];document.getElementById('proverbText').textContent=data.proverb;document.getElementById('focusDesc').textContent=data.desc;const ts=today.toISOString().split('T')[0];if(localStorage.getItem('solomons_wisdom_done')===ts){const btn=document.getElementById('doneBtn');btn.textContent='✓ Wisdom Applied';btn.classList.add('done');btn.disabled=true;}}
    function markDone(){const btn=document.getElementById('doneBtn');btn.textContent='✓ Wisdom Applied';btn.classList.add('done');btn.disabled=true;localStorage.setItem('solomons_wisdom_done',new Date().toISOString().split('T')[0]);saveDailyProgress('solomons_wisdom');spawnCelebParticles();setTimeout(()=>{ if(allDoneToday()) showCelebration(); else renderOtherCards('solomons_wisdom_done'); },600);}
    window.addEventListener('pageshow',function(ev){if(ev.persisted){document.body.classList.remove('page-fade-out');document.body.style.opacity='';}}); function navigateTo(e,url){e.preventDefault();document.body.classList.add('page-fade-out');setTimeout(()=>window.location.href=url,350);}
    const ALL_CARDS=[{key:'daily_focus_done',emoji:'🎯',label:'Daily Focus',url:'player-daily-focus.html'},{key:'divine_truth_done',emoji:'✝️',label:'Divine Truth',url:'player-divine-truth.html'},{key:'solomons_wisdom_done',emoji:'👑',label:"Solomon's Wisdom",url:'player-solomons-wisdom.html'},{key:'daily_decree_done',emoji:'📜',label:'Daily Decree',url:'player-daily-decree.html'}];
    const todayStr=new Date().toISOString().split('T')[0];
    function isDoneToday(k){return localStorage.getItem(k)===todayStr;}
    function allDoneToday(){return ALL_CARDS.every(c=>isDoneToday(c.key));}
    function renderOtherCards(currentKey){const others=ALL_CARDS.filter(c=>c.key!==currentKey);const s=document.createElement('div');s.className='other-cards-section';s.innerHTML=`<div class="other-cards-title">Today's Practice</div><div class="other-cards-grid">${others.map(c=>`<a class="other-card${isDoneToday(c.key)?' is-done':''}" href="${c.url}" onclick="navigateTo(event,'${c.url}')">${isDoneToday(c.key)?'<span class="other-card-check">✓</span>':''}<div class="other-card-icon">${c.emoji}</div><div class="other-card-label">${c.label}</div></a>`).join('')}</div>`;document.body.appendChild(s);}
    function showCelebration(){const m=document.createElement('div');m.className='celeb-overlay';m.innerHTML=`<div class="celeb-modal"><div class="celeb-stars">✦ ✦ ✦</div><div class="celeb-emoji">🙌</div><div class="celeb-title">All Done Today!</div><div class="celeb-text">You have walked in full alignment today. Your faithfulness has been registered in Heaven.</div><div class="celeb-verse">"Well done, good and faithful servant." — Matthew 25:23</div><button class="celeb-btn" onclick="navigateTo(event,'index.html')">Return Home</button></div>`;document.body.appendChild(m);setTimeout(()=>m.classList.add('visible'),50);spawnCelebParticles();}
    function spawnCelebParticles(){const colors=['#c9a84c','#e8c96d','#fff8e7','#ffffff'];for(let i=0;i<50;i++){const p=document.createElement('div');p.className='particle';const size=4+Math.random()*8,angle=Math.random()*Math.PI*2,dist=100+Math.random()*200;p.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};position:fixed;left:${window.innerWidth/2}px;top:${window.innerHeight/2}px;border-radius:50%;pointer-events:none;z-index:700;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist-80}px;animation:particleFly ${0.9+Math.random()*0.7}s ease-out ${Math.random()*0.2}s forwards;`;document.body.appendChild(p);setTimeout(()=>p.remove(),1800);}}
    init();
    renderOtherCards('solomons_wisdom_done');
  </script>
</body>
</html>
